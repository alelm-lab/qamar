server {
    listen 80;
    server_name www.emi.ac.ma emi.ac.ma localhost;

    location /alelm/qamar/api/ {
        rewrite ^/alelm/qamar/api/(.*)$ /api/$1 break;
        proxy_pass http://qamar_front_web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://qamar_front_web:8000/static/;
    }

    location /alelm/qamar/ {
        alias /usr/share/nginx/html/alelm/qamar/;
        try_files $uri $uri/ /alelm/qamar/index.html;
    }

    location = /alelm/qamar {
        return 301 /alelm/qamar/;
    }
}